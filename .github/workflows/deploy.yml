name: CI/CD - Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: test-agents-ai-app
  REGION: us-central1
  SERVICE_NAME: PRODUCT_NAME
  WORKLOAD_IDENTITY_PROVIDER: projects/418791284533/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-deploy@test-agents-ai-app.iam.gserviceaccount.com
  IMAGE: us-central1-docker.pkg.dev/test-agents-ai-app/product-name/PRODUCT_NAME:latest

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Code Quality & Security Scan (Flake8 & Bandit)
        run: |
          pip install bandit flake8
          flake8 product_app --select=F,E9,W6
          bandit -c .bandit.yml -r product_app

      - name: Autenticar en GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Construir y Empujar Imagen Docker
        run: |
          docker build -t ${{ env.IMAGE }} .
          docker push ${{ env.IMAGE }}

      - name: Deploy a Cloud Run (Anti-drift Enforcer)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --min-instances 1 \
            --max-instances 10 \
            --service-account product-name-runner@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars HOST=0.0.0.0 \
            --set-env-vars PUBLIC_BASE_URL=https://PRODUCT_DOMAIN \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }} \
            --set-env-vars GOOGLE_CLOUD_LOCATION=${{ env.REGION }} \
            --set-env-vars CLOUD_SQL_INSTANCE_CONNECTION_NAME=${{ env.PROJECT_ID }}:${{ env.REGION }}:quien-prod \
            --set-env-vars CLOUD_SQL_IP_TYPE=public \
            --set-env-vars DATABASE_NAME=product_app \
            --set-env-vars DATABASE_USER=svc_product_app \
            --set-env-vars RUN_RATE_LIMIT_WINDOW_SECONDS=300 \
            --set-env-vars RUN_RATE_LIMIT_MAX_REQUESTS=6 \
            --set-env-vars PREVIEW_RATE_LIMIT_WINDOW_SECONDS=300 \
            --set-env-vars PREVIEW_RATE_LIMIT_MAX_REQUESTS=3 \
            --set-env-vars PREVIEW_MONTHLY_LIMIT_PER_EMAIL=1 \
            --set-env-vars MAX_CONCURRENT_RUNS=2 \
            --set-env-vars PRODUCT_ENABLE_DEV_AUTH=false \
            --set-env-vars "PRODUCT_DEFAULT_ORG_NAME=Product Name" \
            --set-env-vars PRODUCT_DEFAULT_USER_EMAIL=owner@PRODUCT_DOMAIN \
            --set-env-vars PRODUCT_PLATFORM_ADMIN_EMAILS=jean@sitiouno.com \
            --set-env-vars PRODUCT_BOOTSTRAP_CREDIT_EMAILS=jean@sitiouno.com \
            --set-env-vars PRODUCT_BOOTSTRAP_CREDITS=5000 \
            --set-env-vars PRODUCT_DEFAULT_LANGUAGE=en \
            --set-env-vars PRODUCT_COORDINATOR_MODEL=gemini-3-flash-preview \
            --set-env-vars PRODUCT_SEARCH_MODEL=gemini-3.1-pro-preview \
            --set-env-vars PRODUCT_REASONING_MODEL=gemini-3.1-pro-preview \
            --set-env-vars PRODUCT_REPORT_MODEL=gemini-3-flash-preview \
            --set-env-vars FIREBASE_PROJECT_ID=test-agents-ai-app \
            --set-env-vars FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }} \
            --set-env-vars FIREBASE_AUTH_DOMAIN=test-agents-ai-app.firebaseapp.com \
            --set-env-vars FIREBASE_APP_ID=1:418791284533:web:b4eb0ae9cb9948833f767c \
            --set-env-vars GOOGLE_OAUTH_CLIENT_ID=a27d1fe5a-ae52-4ff2-bcdc-72cb5d409fb5 \
            --set-env-vars "WEBSITE_NAME=Product Name" \
            --set-env-vars "WEBSITE_TAGLINE_EN=Deploy AI-powered MVPs in minutes." \
            --set-env-vars "WEBSITE_TAGLINE_ES=Despliega MVPs con IA en minutos." \
            --set-env-vars "COMPANY_LEGAL_NAME=Product Name" \
            --set-env-vars SUPPORT_EMAIL=support@PRODUCT_DOMAIN \
            --set-env-vars STRIPE_PORTAL_RETURN_URL=https://PRODUCT_DOMAIN/en/app \
            --set-env-vars SMTP_HOST=smtp.gmail.com \
            --set-env-vars SMTP_PORT=587 \
            --set-env-vars SMTP_USER=jean@flexipos.us \
            --set-env-vars MAGIC_LINK_FROM_EMAIL=noreply@PRODUCT_DOMAIN \
            --set-secrets GOOGLE_API_KEY=google-api-key:latest \
            --set-secrets DATABASE_PASSWORD=product-name-db-password:latest \
            --set-secrets APP_SESSION_SECRET=app-session-secret:latest \
            --set-secrets SMTP_PASSWORD=smtp-password:latest
